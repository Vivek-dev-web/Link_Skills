<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 5 ascending warehouse buildings -->
  <rect x="1"    y="26" width="4" height="6"  rx="0.5" fill="#344054"/>
  <rect x="6.5"  y="21" width="4" height="11" rx="0.5" fill="#344054"/>
  <rect x="12"   y="16" width="4" height="16" rx="0.5" fill="#344054"/>
  <rect x="17.5" y="11" width="4" height="21" rx="0.5" fill="#344054"/>
  <rect x="23"   y="6"  width="5" height="26" rx="0.5" fill="#344054"/>
  <!-- Windows on tallest building -->
  <rect x="24.5" y="18" width="2" height="1.5" rx="0.2" fill="white" fill-opacity="0.28"/>
  <rect x="24.5" y="22" width="2" height="1.5" rx="0.2" fill="white" fill-opacity="0.28"/>
  <!-- Orange upward arrow -->
  <rect x="24.5" y="8"  width="2.5" height="9"  rx="0.5" fill="#D4622A"/>
  <polygon points="22.5,9.5 25.75,5 29,9.5" fill="#D4622A"/>
</svg>
